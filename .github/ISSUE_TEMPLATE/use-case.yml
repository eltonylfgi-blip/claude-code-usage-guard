name: "Field report / problem / use case"
description: "Tell us what helped, failed, or would make usage-guard useful. Takes ~30 seconds."
title: "[field-report]: "
labels: ["lead"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks — real setup reports decide what gets fixed or built next. One sentence is enough. Please redact tokens, account IDs, and other secrets.
  - type: dropdown
    id: kind
    attributes:
      label: What kind of report is this?
      options:
        - "It helped or saved a session"
        - "Something behaved unexpectedly"
        - "Real quota mode did not appear"
        - "Feature or use case request"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What happened, or what are you trying to do?
      placeholder: 'e.g. "It warned me before a long task" or "The weekly line did not appear after setup."'
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment (optional)
      description: Claude Code version, OS, plan, and whether you enabled the status-line shim.
      placeholder: "Claude Code 1.x, Windows, Pro, shim enabled"
    validations:
      required: false
  - type: dropdown
    id: interest
    attributes:
      label: If a more advanced version existed (budgets, alerts, team view), would you use it?
      options:
        - "Yes — I'd use a free version"
        - "Yes — I'd consider paying for it"
        - "No — the plugin is enough"
        - "Not sure"
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact (optional)
      description: Email / X / GitHub handle if you'd like to hear back when this ships.
    validations:
      required: false
